name: CI / CD — my-api-lambda

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '18'
  AWS_REGION: ${{ secrets.AWS_REGION }}
  LAMBDA_FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Lint
  # ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ─────────────────────────────────────────
  # JOB 2 — Test
  # ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests with coverage
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 3 — Build
  # ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install production dependencies only
        run: npm ci --omit=dev

      - name: Create deployment ZIP
        run: |
          zip -r function.zip src/ node_modules/ package.json
          echo "ZIP size: $(du -sh function.zip | cut -f1)"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-zip
          path: function.zip
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 4 — Deploy  (main branch only)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to AWS Lambda
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: function-zip

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy ZIP to Lambda
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --zip-file fileb://function.zip \
            --region "$AWS_REGION"

      - name: Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --region "$AWS_REGION"

      - name: Update Lambda environment variables
        run: |
          aws lambda update-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --region "$AWS_REGION" \
            --environment "Variables={
              NODE_ENV=production,
              APP_NAME=my-api-lambda,
              APP_VERSION=1.0.0
            }"

      - name: Publish new Lambda version
        id: publish
        run: |
          VERSION=$(aws lambda publish-version \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --region "$AWS_REGION" \
            --query 'Version' \
            --output text)
          echo "lambda_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Published Lambda version: $VERSION"

      - name: Print deployment summary
        run: |
          echo "✅ Deployed to Lambda function: $LAMBDA_FUNCTION_NAME"
          echo "✅ Published version: ${{ steps.publish.outputs.lambda_version }}"
          echo "✅ Region: $AWS_REGION"